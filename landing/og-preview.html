<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;display:flex;align-items:center;justify-content:center;background:#08080a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  
  /* Background gradient orbs */
  .orb{position:absolute;border-radius:50%;filter:blur(140px);opacity:0.15}
  .orb-1{width:600px;height:600px;background:#7c6aff;top:-200px;right:-100px}
  .orb-2{width:500px;height:500px;background:#34d399;bottom:-200px;left:-100px;opacity:0.1}
  .orb-3{width:400px;height:400px;background:#a78bfa;top:200px;left:300px;opacity:0.08}
  
  /* Subtle grid */
  .grid{position:absolute;inset:0;background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px}
  
  /* Content */
  .container{position:relative;z-index:2;width:1000px;padding:60px}
  
  .eyebrow{font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:#a78bfa;margin-bottom:24px;font-weight:600}
  
  .headline{font-size:52px;line-height:1.15;color:#f4f3ff;font-weight:800;letter-spacing:-0.02em;margin-bottom:24px}
  .headline em{font-style:normal;background:linear-gradient(90deg,#7c6aff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  
  .sub{font-size:22px;color:#a3a1b8;line-height:1.5;max-width:720px;margin-bottom:48px;font-weight:400}
  .sub strong{color:#f4f3ff;font-weight:600}
  
  /* Bottom bar */
  .bottom{display:flex;align-items:center;gap:20px;margin-top:40px;padding-top:32px;border-top:1px solid rgba(255,255,255,0.06)}
  .price{background:rgba(124,106,255,0.1);border:1px solid rgba(124,106,255,0.2);padding:8px 16px;border-radius:8px;color:#a78bfa;font-size:18px;font-weight:600}
  .divider{width:1px;height:20px;background:rgba(255,255,255,0.1)}
  .guarantee{color:#6b6a82;font-size:14px;letter-spacing:0.05em}
  .url{margin-left:auto;color:#f4f3ff;font-size:18px;font-weight:600;letter-spacing:0.05em}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid"></div>
<div class="container">
  <div class="eyebrow">v1.0 · INTENT INTELLIGENCE PLATFORM</div>
  <h1 class="headline">Your next customer is <em>complaining about their problem</em> right now.</h1>
  <p class="sub">Influentia scans Reddit & LinkedIn for <strong>real buyers already asking for your solution</strong>. AI drafts replies in your voice. <strong>You press send.</strong></p>
  <div class="bottom">
    <span class="price">$97/mo</span>
    <span class="divider"></span>
    <span class="guarantee">14-DAY MONEY-BACK GUARANTEE</span>
    <span class="url">influentia.io</span>
  </div>
</div>
</body>
</html>
